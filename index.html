<!DOCTYPE html>

<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            min-height: 100vh;
        }
        #video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        .overlay {
            position: fixed;
            bottom: 48px;
            left: 0;
            right: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 24px;
        }
        .hero {
            text-align: center;
            max-width: 760px;
        }
        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 32px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }
        .hero p {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            line-height: 1.75;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 1px 8px rgba(0,0,0,0.6);
            margin-bottom: 20px;
        }
        .hero p + p {
            color: rgba(255,255,255,0.75);
            font-size: clamp(0.9rem, 2vw, 1.1rem);
        }
        .credits {
            position: fixed;
            bottom: 16px;
            right: 20px;
            z-index: 2;
            text-align: right;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.45);
            line-height: 1.6;
        }
        .credits a {
            color: rgba(255,255,255,0.45);
            text-decoration: none;
        }
        .credits a:hover {
            color: rgba(255,255,255,0.8);
        }

    <video id="video-bg" autoplay muted loop playsinline>
        <source src="images/algolotl.mp4" type="video/mp4" aria-description="Thanks to https://www.asciii.com/ for the amazing video background!">
    </video>
    <div class="overlay">
        <div class="hero">
            <h1>algolotl</h1>
            <p>Algorithmic trading that adapts, evolves, and never stops learning.</p>
        </div>

    <div class="credits">
